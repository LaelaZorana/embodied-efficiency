<header class="sticky top-0 z-30 border-b border-slate-200/70 bg-slate-50/80 backdrop-blur-md dark:border-white/10 dark:bg-[#080b14]/80">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-4 sm:px-6 lg:px-8 h-16">
    <a href="/" class="flex items-center gap-2.5 group">
      <span class="grid h-9 w-9 place-items-center rounded-2xl bg-gradient-to-br from-signal-600 to-cyan2-400 text-white shadow-lg shadow-signal-700/30">
        <!-- signal stepping up to meet the budget -->
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 17l4-8 4 5 3-6 4 9" />
        </svg>
      </span>
      <span class="flex flex-col leading-none">
        <span class="text-base font-bold tracking-tight">embodied<span class="ee-gradient-text">-efficiency</span></span>
        <span class="text-[10px] font-medium uppercase tracking-[0.14em] text-slate-400 dark:text-slate-500">deploy console for VLAs</span>
      </span>
    </a>

    <nav class="flex items-center gap-1 sm:gap-2">
      <a href="#compiler" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-200/60 dark:text-slate-300 dark:hover:bg-white/5">Compiler</a>
      <a href="#supervisor" class="rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-200/60 dark:text-slate-300 dark:hover:bg-white/5">Supervisor</a>
      <a href="{{ github_url }}" target="_blank" rel="noopener"
         class="ml-1 inline-flex items-center gap-1.5 rounded-xl bg-signal-600 px-3.5 py-2 text-sm font-semibold text-white shadow-sm shadow-signal-700/25 transition hover:bg-signal-700">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.73.5.5 5.73.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56v-2c-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.69-1.28-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11 11 0 0 1 5.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.42-2.69 5.39-5.25 5.68.41.36.78 1.06.78 2.14v3.17c0 .31.21.68.8.56A10.52 10.52 0 0 0 23.5 12C23.5 5.73 18.27.5 12 .5Z"/></svg>
        <span class="hidden sm:inline">GitHub</span>
      </a>
      <button type="button" onclick="toggleTheme()" aria-label="Toggle dark mode"
              class="ee-focus ml-1 grid h-9 w-9 place-items-center rounded-lg text-slate-500 transition hover:bg-slate-200/60 dark:text-slate-400 dark:hover:bg-white/5">
        <svg class="h-5 w-5 dark:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="hidden h-5 w-5 dark:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </nav>
  </div>

  <div class="border-b border-cyan2-200/50 bg-cyan2-50/60 dark:border-cyan2-400/15 dark:bg-cyan2-500/5">
    <div class="mx-auto flex max-w-6xl items-center gap-2 px-4 sm:px-6 lg:px-8 py-1.5 text-xs text-cyan2-800 dark:text-cyan2-200">
      <svg class="h-3.5 w-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
      <span>The compiler runs on a <strong>real L4 Pareto frontier</strong> (latencies measured, not modelled). The supervisor below runs the <strong>actual governance code</strong>, vetting each action live.</span>
    </div>
  </div>
</header>
